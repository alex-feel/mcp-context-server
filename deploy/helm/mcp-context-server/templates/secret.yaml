{{- $needsSecret := false }}
{{- $data := dict }}

{{- /* PostgreSQL password */}}
{{- if and .Values.storage.postgresql.enabled (not .Values.storage.postgresql.existingSecret) .Values.storage.postgresql.password }}
  {{- $needsSecret = true }}
  {{- $_ := set $data "postgresql-password" (.Values.storage.postgresql.password | b64enc) }}
{{- end }}

{{- /* OpenAI API key -- ONE 'openai-api-key' shared by the openai embedding and openai summary
       providers (both read the single OPENAI_API_KEY env var). Source it from embeddingSecrets
       first, then summarySecrets, under the single data key the Deployment references, so a
       dual-openai config never emits two divergent keys (and the Deployment never renders a
       duplicate, last-wins OPENAI_API_KEY env var). */}}
{{- $semOpenai := and .Values.search.semantic.enabled (eq .Values.search.semantic.provider "openai") }}
{{- $sumOpenai := and .Values.search.summary.enabled (eq .Values.search.summary.provider "openai") }}
{{- /* The Deployment references this chart-managed 'openai-api-key' ONLY when no
       active openai provider supplies an existingSecret (otherwise its
       OPENAI_API_KEY env points at that existingSecret). Mirror that exact
       condition here so the two templates cannot diverge: when either openai
       side uses an existingSecret, populate nothing -- avoiding an orphaned,
       never-referenced chart secret key. (An inline key supplied on the other
       side is intentionally unused: both openai providers read the single shared
       OPENAI_API_KEY, so the existingSecret the Deployment points at is the one
       source of truth.) */}}
{{- $openaiUsesExistingSecret := or (and $semOpenai .Values.embeddingSecrets.existingSecret) (and $sumOpenai .Values.summarySecrets.existingSecret) }}
{{- $openaiKey := "" }}
{{- if not $openaiUsesExistingSecret }}
  {{- if and $semOpenai .Values.embeddingSecrets.openaiApiKey }}
    {{- $openaiKey = .Values.embeddingSecrets.openaiApiKey }}
  {{- else if and $sumOpenai .Values.summarySecrets.openaiApiKey }}
    {{- $openaiKey = .Values.summarySecrets.openaiApiKey }}
  {{- end }}
{{- end }}
{{- if $openaiKey }}
  {{- $needsSecret = true }}
  {{- $_ := set $data "openai-api-key" ($openaiKey | b64enc) }}
{{- end }}

{{- /* Embedding provider API keys (non-openai; only if not using existing secret) */}}
{{- if and .Values.search.semantic.enabled (not .Values.embeddingSecrets.existingSecret) }}
  {{- /* Azure OpenAI API key */}}
  {{- if and (eq .Values.search.semantic.provider "azure") .Values.embeddingSecrets.azureOpenaiApiKey }}
    {{- $needsSecret = true }}
    {{- $_ := set $data "azure-openai-api-key" (.Values.embeddingSecrets.azureOpenaiApiKey | b64enc) }}
  {{- end }}
  {{- /* HuggingFace API token */}}
  {{- if and (eq .Values.search.semantic.provider "huggingface") .Values.embeddingSecrets.huggingfaceApiToken }}
    {{- $needsSecret = true }}
    {{- $_ := set $data "huggingface-api-token" (.Values.embeddingSecrets.huggingfaceApiToken | b64enc) }}
  {{- end }}
  {{- /* Voyage API key */}}
  {{- if and (eq .Values.search.semantic.provider "voyage") .Values.embeddingSecrets.voyageApiKey }}
    {{- $needsSecret = true }}
    {{- $_ := set $data "voyage-api-key" (.Values.embeddingSecrets.voyageApiKey | b64enc) }}
  {{- end }}
{{- end }}

{{- /* Summary provider API keys (non-openai; only if not using existing secret) */}}
{{- if and .Values.search.summary.enabled (not .Values.summarySecrets.existingSecret) }}
  {{- /* Anthropic API key for summary */}}
  {{- if and (eq .Values.search.summary.provider "anthropic") .Values.summarySecrets.anthropicApiKey }}
    {{- $needsSecret = true }}
    {{- $_ := set $data "summary-anthropic-api-key" (.Values.summarySecrets.anthropicApiKey | b64enc) }}
  {{- end }}
{{- end }}

{{- /* LangSmith API key (only if not using existing secret) */}}
{{- if and .Values.langsmith.enabled (not .Values.langsmith.existingSecret) .Values.langsmith.apiKey }}
  {{- $needsSecret = true }}
  {{- $_ := set $data "langsmith-api-key" (.Values.langsmith.apiKey | b64enc) }}
{{- end }}

{{- if $needsSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mcp-context-server.fullname" . }}
  labels:
    {{- include "mcp-context-server.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := $data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
