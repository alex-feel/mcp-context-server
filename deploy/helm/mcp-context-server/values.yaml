# Default values for mcp-context-server
# This is a YAML-formatted file.

# Image configuration
image:
  repository: ghcr.io/alex-feel/mcp-context-server
  # Defaults to Chart.appVersion if not set
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

replicaCount: 1

# Service configuration
service:
  type: ClusterIP
  port: 8000

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: mcp-context-server.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: mcp-context-server-tls
  #    hosts:
  #      - mcp-context-server.local

# Resource limits
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Health probes
probes:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  startup:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30

# Environment configuration
env:
  MCP_TRANSPORT: "http"
  FASTMCP_HOST: "0.0.0.0"
  FASTMCP_PORT: "8000"
  FASTMCP_STATELESS_HTTP: "true"
  FASTMCP_ENABLE_RICH_LOGGING: "false"
  LOG_LEVEL: "INFO"

# Storage backend configuration
storage:
  backend: sqlite
  sqlite:
    enabled: true
    path: /data/context_storage.db
    persistence:
      enabled: true
      size: 1Gi
      storageClassName: ""
      accessModes:
        - ReadWriteOnce
  postgresql:
    enabled: false
    host: ""
    port: "5432"
    user: "postgres"
    password: ""
    database: "mcp_context"
    sslMode: "prefer"
    # Use existing secret for password
    existingSecret: ""
    existingSecretKey: "postgresql-password"

# Search features
search:
  fts:
    enabled: true
    language: "english"
  semantic:
    enabled: false
    # Embedding provider: ollama (default), openai, azure, huggingface, voyage
    provider: "ollama"
    model: "qwen3-embedding:0.6b"
    dim: 1024
    # Timeout and retry settings
    timeout: 60
    retryMaxAttempts: 3
    retryBaseDelay: 1.0
    # Concurrency control
    maxConcurrent: 3     # Maximum parallel embedding requests (1-20)
  hybrid:
    enabled: false
    rrfK: 60
    rrfOverfetch: 2  # Multiplier for over-fetching before RRF fusion
  # Text chunking for improved semantic search on long documents
  chunking:
    enabled: true
    size: 1500       # Target chunk size in characters
    overlap: 150     # Overlap between chunks in characters
    aggregation: max # How to aggregate chunk scores (only 'max' supported)
    dedupOverfetch: 5 # Multiplier for over-fetching before deduplication
  # Cross-encoder reranking for improved search precision
  reranking:
    enabled: true
    provider: flashrank
    model: ms-marco-MiniLM-L-12-v2
    maxLength: 512   # Maximum input length in tokens
    overfetch: 4     # Multiplier for over-fetching before reranking
    cacheDir: ""     # Custom cache directory for model files (empty = system default)
  # LLM-based summary generation
  summary:
    enabled: true
    provider: "ollama"       # ollama (default), openai, or anthropic
    model: "qwen3:0.6b"     # Summary model
    maxTokens: 2000          # Max output tokens (50-5000)
    minContentLength: 500    # Min chars to trigger summary (0=always)
    prompt: ""               # Custom prompt (empty = built-in default)
    # Timeout and retry settings
    timeout: 120.0
    retryMaxAttempts: 3
    retryBaseDelay: 1.0
    # Concurrency control
    maxConcurrent: 3         # Maximum parallel summary requests (1-20)
  # Default sort order for search results
  defaultSortBy: relevance  # Only 'relevance' supported in current version

# Ollama sidecar configuration (used when search.semantic.provider=ollama or search.summary.provider=ollama)
ollama:
  enabled: false
  # Embedding truncation control: false (default) returns error when context exceeded, true enables silent truncation
  embeddingTruncate: false
  # Embedding context window size in tokens (range: 512-2097152)
  embeddingNumCtx: 4096
  # Summary truncation control: false (default) returns error when context exceeded, true enables silent truncation
  summaryTruncate: false
  # Summary context window size in tokens (range: 512-2097152)
  summaryNumCtx: 32768
  # Auto-pull models on startup via initContainer (derived from search.semantic.model and search.summary.model)
  # Set to false to disable auto-pull (models must be pre-loaded manually)
  autoPull: true
  image:
    repository: ollama/ollama
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
      # Uncomment to enable NVIDIA GPU acceleration (requires NVIDIA device plugin)
      # nvidia.com/gpu: "1"
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""

# LangSmith tracing (optional)
langsmith:
  enabled: false
  # API key stored in secret
  apiKey: ""
  endpoint: "https://api.smith.langchain.com"
  project: "mcp-context-server"
  # Use existing secret
  existingSecret: ""
  existingSecretKey: "langsmith-api-key"

# Provider-specific API keys (stored in secrets)
embeddingSecrets:
  # OpenAI
  openaiApiKey: ""
  # Azure OpenAI
  azureOpenaiApiKey: ""
  azureOpenaiEndpoint: ""
  azureOpenaiDeployment: ""
  azureOpenaiApiVersion: "2024-02-01"
  # HuggingFace
  huggingfaceApiToken: ""
  # Voyage AI
  voyageApiKey: ""
  # Use existing secret for all provider keys
  existingSecret: ""

# Summary provider API keys (for openai/anthropic providers)
summarySecrets:
  # OpenAI (when summary.provider=openai)
  openaiApiKey: ""
  # Anthropic (when summary.provider=anthropic)
  anthropicApiKey: ""
  # Use existing secret for summary provider keys
  existingSecret: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}
