# SQLite-specific configuration
# Usage: helm install mcp deploy/helm/mcp-context-server -f deploy/helm/mcp-context-server/values-sqlite.yaml

storage:
  backend: sqlite
  sqlite:
    enabled: true
    persistence:
      enabled: true
      size: 1Gi
  postgresql:
    enabled: false

search:
  fts:
    enabled: true
  # semantic.enabled provisions the embedding subsystem (ENABLE_EMBEDDING_GENERATION
  # + ENABLE_SEMANTIC_SEARCH=auto); enable it together with an embedding provider
  # (set ollama.enabled=true or configure an API key in values.yaml).
  semantic:
    enabled: false
  hybrid:
    enabled: true

ollama:
  enabled: false

# Embedding compression (default ON in v3.0.0; see docs/embedding-compression.md).
# COMPRESSION_SEED is load-bearing and IMMUTABLE after the first server start.
# Pick a non-negative integer and keep it stable for the lifetime of this
# database; a mismatch refuses startup with exit 78.
# Set compression.enabled: false to opt out and use fp32 storage.
compression:
  enabled: true
  provider: turboquant
  bits: 4
  variant: ip
  seed: 0
  maxConcurrent: 4
