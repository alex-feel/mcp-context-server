# Docker Compose for MCP Context Server with SQLite + Ollama Embeddings
# Usage: docker compose -f deploy/docker/docker-compose.sqlite.ollama.dev.yml up -d
#
# Optional: For additional configuration (LangSmith tracing, log level):
#   1. Copy .env-sqlite.ollama.example to .env
#   2. Configure desired settings in .env
#   3. Run normally - the .env file will be loaded automatically

name: context-server

services:
  mcp-context-server:
    image: mcp-context-server
    build:
      context: ../..
      dockerfile: Dockerfile
    pull_policy: build
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - MCP_TRANSPORT=http
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
      # Disable Rich log formatting and ASCII banner for clean single-line container logs
      - FASTMCP_ENABLE_RICH_LOGGING=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - STORAGE_BACKEND=sqlite
      - DB_PATH=/data/context_storage.db
      - ENABLE_SEMANTIC_SEARCH=true
      # Embedding provider selection (default: ollama)
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-ollama}
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      - ENABLE_FTS=true
      - ENABLE_HYBRID_SEARCH=true
      # Summary generation
      - SUMMARY_MODEL=${SUMMARY_MODEL:-qwen3:0.6b}
      - SUMMARY_PROVIDER=${SUMMARY_PROVIDER:-ollama}
      # FlashRank reranking model cache (persistent across restarts)
      - RERANKING_CACHE_DIR=/cache/flashrank
      # LangSmith tracing (optional, disabled by default)
      # - LANGSMITH_TRACING=false
      # - LANGSMITH_API_KEY=
      # - LANGSMITH_PROJECT=mcp-context-server
    volumes:
      - mcp-data:/data
      - flashrank-cache:/cache/flashrank
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure:5

  ollama:
    build:
      context: ../..
      dockerfile: deploy/docker/ollama/Dockerfile
      # Uncomment for AMD ROCm GPU (uses ollama/ollama:rocm base image):
      # args:
      #   OLLAMA_TAG: rocm
    pull_policy: build
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - SUMMARY_MODEL=${SUMMARY_MODEL:-qwen3:0.6b}
      # Uncomment for Intel/Vulkan GPU (EXPERIMENTAL - may produce degraded output):
      # - OLLAMA_VULKAN=1
      # Uncomment if Intel Vulkan produces gibberish (disables integer dot product):
      # - GGML_VK_DISABLE_INTEGER_DOT_PRODUCT=1
    volumes:
      - ollama-data:/root/.ollama
    # === GPU Acceleration ===
    # Uncomment ONE section based on your GPU vendor.
    # Full guide: docs/deployment/gpu-acceleration.md
    #
    # --- NVIDIA GPU (requires NVIDIA Container Toolkit) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    #
    # --- AMD GPU (requires ROCm driver; also uncomment OLLAMA_TAG above) ---
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    #
    # --- Intel/Vulkan GPU (EXPERIMENTAL - see docs for known issues) ---
    # Also uncomment OLLAMA_VULKAN=1 in the environment section above.
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    healthcheck:
      test: ["CMD-SHELL", "ollama show \"$${EMBEDDING_MODEL}\" >/dev/null 2>&1 && ollama show \"$${SUMMARY_MODEL}\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  mcp-data:
    name: mcp-context-sqlite-ollama-data
  ollama-data:
    name: ollama-models
  flashrank-cache:
    name: flashrank-model-cache
