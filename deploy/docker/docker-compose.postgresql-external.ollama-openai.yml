# Docker Compose for MCP Context Server with External PostgreSQL + Ollama Embeddings + OpenAI Summary
# PostgreSQL must be deployed separately (corporate server, Supabase, etc.)
#
# Setup:
#   1. Copy .env-postgresql-external.ollama-openai.example to .env in this directory
#   2. Add your OPENAI_API_KEY and PostgreSQL connection details to .env
#   3. Run: docker compose -f deploy/docker/docker-compose.postgresql-external.ollama-openai.yml up -d

name: context-server

services:
  mcp-context-server:
    image: ghcr.io/alex-feel/mcp-context-server:latest-ollama-openai
    pull_policy: always
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: true
    environment:
      - MCP_TRANSPORT=http
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
      # Disable Rich log formatting and ASCII banner for clean single-line container logs
      - FASTMCP_ENABLE_RICH_LOGGING=false
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # PostgreSQL backend (connection details from .env file)
      - STORAGE_BACKEND=postgresql
      # Semantic search configuration
      - ENABLE_SEMANTIC_SEARCH=true
      # Ollama embeddings configuration
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-ollama}
      - OLLAMA_HOST=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-1024}
      # Full-text and hybrid search
      - ENABLE_FTS=true
      - ENABLE_HYBRID_SEARCH=true
      # OpenAI summary generation (uses OPENAI_API_KEY from .env)
      - SUMMARY_PROVIDER=openai
      - SUMMARY_MODEL=${SUMMARY_MODEL:-gpt-5.4-nano}
      # FlashRank reranking model cache (persistent across restarts)
      - RERANKING_CACHE_DIR=/cache/flashrank
    volumes:
      - flashrank-cache:/cache/flashrank
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure:5

  ollama:
    # Ollama sidecar always builds locally (no published image)
    build:
      context: ../..
      dockerfile: deploy/docker/ollama/Dockerfile
      # Uncomment for AMD ROCm GPU (uses ollama/ollama:rocm base image):
      # args:
      #   OLLAMA_TAG: rocm
    pull_policy: build
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      # Summary is handled by OpenAI, not Ollama
      - SUMMARY_PROVIDER=openai
      # Uncomment for Intel/Vulkan GPU (EXPERIMENTAL - may produce degraded output).
      # Linux host only -- NOT available on Docker Desktop for Windows (WSL2).
      # For Windows, run Ollama natively with OLLAMA_VULKAN=1 instead.
      # See docs/deployment/gpu-acceleration.md for details.
      # - OLLAMA_VULKAN=1
      # Uncomment if Intel Vulkan produces gibberish (disables integer dot product):
      # - GGML_VK_DISABLE_INTEGER_DOT_PRODUCT=1
    volumes:
      - ollama-data:/root/.ollama
    # === GPU Acceleration ===
    # Uncomment ONE section based on your GPU vendor.
    # Full guide: docs/deployment/gpu-acceleration.md
    #
    # --- NVIDIA GPU (requires NVIDIA Container Toolkit) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    #
    # --- AMD GPU (requires ROCm driver on Linux host; also uncomment OLLAMA_TAG above) ---
    # Requires /dev/dri and /dev/kfd device nodes (Linux only). NOT available on Docker Desktop for Windows.
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    #
    # --- Intel/Vulkan GPU (EXPERIMENTAL - Linux host only, see docs for known issues) ---
    # Requires /dev/dri device nodes (Linux DRM). NOT available on Docker Desktop for Windows.
    # Also uncomment OLLAMA_VULKAN=1 in the environment section above.
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    healthcheck:
      test: ["CMD-SHELL", "ollama show \"$${EMBEDDING_MODEL}\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  ollama-data:
    name: ollama-models
  flashrank-cache:
    name: flashrank-model-cache
