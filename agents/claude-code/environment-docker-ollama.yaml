# MCP Context Server Integration
# Lightweight environment for universal MCP Context Server integration.
# Provides persistent memory across Claude Code sessions via context server hooks and skills.
# Downloads the PostgreSQL+Ollama compose file and starts the stack automatically.
#
# Prerequisites:
#   - uv (required for PEP 723 hooks with inline dependencies; auto-installed by setup-environment.ps1)
#   - Docker Desktop running (required to start the MCP Context Server)

name: MCP Context Server Integration (Ollama Models Only)

description: |
  For more information, see:
  https://github.com/alex-feel/mcp-context-server/blob/main/docs/connecting-ai-assistant.md#one-command-setup

# Additional files to download (utility modules loaded by other hooks at runtime)
files-to-download:
  - source: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/hook_config_loader.py
    dest: ~/.claude/hooks/
  - source: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/hook_json_output.py
    dest: ~/.claude/hooks/
  - source: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/deploy/docker/docker-compose.postgresql.ollama.yml
    dest: ~/.mcp/docker-compose.postgresql.ollama.yml

# Start the stack after the compose file has been downloaded.
dependencies:
  common:
    - docker compose -f ~/.mcp/docker-compose.postgresql.ollama.yml up -d

# Environment variables
os-env-variables:
  MCP_TIMEOUT: "300000"
  MAX_MCP_OUTPUT_TOKENS: "100000"
  ENABLE_TOOL_SEARCH: "1"

  # Enable the context-saver hooks' diagnostic logging so a failed store
  # (for example, the context server still starting while Ollama pulls its
  # embedding and summary models) is recorded in the hook log instead of
  # failing silently. Log location: ~/.claude/hook_logs/user_prompt_context_saver.log
  CLAUDE_HOOK_DEBUG_ENABLED: "1"

# Skills for context management
skills:
  - name: context-retrieval-protocol
    base: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/common/skills/context-retrieval-protocol
    files:
      - SKILL.md

  - name: context-preservation-protocol
    base: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/common/skills/context-preservation-protocol
    files:
      - SKILL.md

# Rules for context server usage guidance
rules:
  - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/rules/context-server-integration.md

# MCP server configuration
mcp-servers:
  - name: context-server
    scope: user
    transport: http
    url: http://localhost:8000/mcp

# Hook system for context management
hooks:
  files:
    # Context persistence hooks and configs
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/user_prompt_context_saver.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/configs/user_prompt_context_saver_config.yaml

    # Project identity
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/worktree_context.py

    # Session context hooks
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/thread_id_context.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/timezone_date_context.py

    # Context lifecycle hooks and configs
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/context_awareness_guidance.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/configs/context_awareness_guidance_config.yaml

    # Subagent context protocol injection and its config - SubagentStart store/retrieve protocol
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/subagent_context_protocol_injection.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/configs/subagent_context_protocol_injection_config.yaml

  events:
    # SessionStart context hooks (ORDER MATTERS: worktree BEFORE thread_id)
    - event: SessionStart
      matcher: '*'
      type: command
      command: worktree_context.py

    - event: SessionStart
      matcher: '*'
      type: command
      command: thread_id_context.py

    - event: SessionStart
      matcher: '*'
      type: command
      command: timezone_date_context.py

    # Post-compaction recovery guidance for the main agent
    - event: SessionStart
      matcher: '*'
      type: command
      command: context_awareness_guidance.py
      config: context_awareness_guidance_config.yaml

    # Subagent context protocol injection - retrieve-first / store-before-stop protocol at spawn
    - event: SubagentStart
      matcher: '*'
      type: command
      command: subagent_context_protocol_injection.py
      config: subagent_context_protocol_injection_config.yaml

    # Subagent context injection - mirrors SessionStart context for spawned subagents
    - event: SubagentStart
      matcher: '*'
      type: command
      command: worktree_context.py

    - event: SubagentStart
      matcher: '*'
      type: command
      command: thread_id_context.py

    - event: SubagentStart
      matcher: '*'
      type: command
      command: timezone_date_context.py

    # Context preservation during workflow
    - event: UserPromptSubmit
      type: command
      command: user_prompt_context_saver.py
      config: user_prompt_context_saver_config.yaml

    # A blocking SubagentStop report-saver is intentionally NOT registered here.
    # A blocking stop-time hook forces an extra turn after a subagent finishes and
    # can overwrite the subagent's returned result with a one-line confirmation --
    # wrong for this lightweight, general-purpose integration where callers expect
    # the subagent's actual output. Store-before-stop is instead encouraged
    # non-blockingly via the SubagentStart context protocol injection above, plus
    # the context-management skills and rules bundled with this environment.

# Permissions configuration. Declared under user-settings (raw settings.json
# content, camelCase keys) because that is the only surface the setup writes
# to ~/.claude/settings.json; a root-level permissions key is not part of the
# configuration schema and would be silently ignored at install time.
user-settings:
  permissions:
    defaultMode: default

    allow:
      - mcp__context-server__search_context
      - mcp__context-server__get_context_by_ids
      - mcp__context-server__store_context
      - mcp__context-server__update_context
      - mcp__context-server__hybrid_search_context
      - mcp__context-server__semantic_search_context
      - mcp__context-server__fts_search_context
      - mcp__context-server__list_threads
      - mcp__context-server__get_statistics

    ask:
      - mcp__context-server__store_context_batch
      - mcp__context-server__update_context_batch
      - mcp__context-server__delete_context
      - mcp__context-server__delete_context_batch

post-install-notes: |
  MCP Context Server is deploying at: http://localhost:8000/mcp

  First-run: Ollama pulls qwen3-embedding:0.6b and qwen3:0.6b (~1.2 GB). Allow 2-5 minutes.

  Follow progress:
    docker compose -f ~/.mcp/docker-compose.postgresql.ollama.yml logs -f ollama

  Verify server health:
    curl http://localhost:8000/health

  Stop the stack:
    docker compose -f ~/.mcp/docker-compose.postgresql.ollama.yml down

  Update (re-download compose file + pull newer images + restart):
    Just re-run the same script from https://github.com/alex-feel/mcp-context-server/blob/main/docs/connecting-ai-assistant.md

  Windows PowerShell: replace ~ with $HOME in the commands above.
