# User Prompt Context Saver Hook Configuration
# This config controls which user prompts are saved to the context server.

# Whether the hook is enabled (optional, default: true)
enabled: true

# Whether to output stored context_id to model context via hookSpecificOutput.additionalContext
# When enabled, the hook outputs a JSON response with the context_id after successful storage,
# allowing the orchestrator to reference the exact user message by ID in agent prompts.
output_context_id: true

# Regex patterns to skip saving (for internal hook prompts)
# When creating new `type: prompt` hooks, add their prompt prefix pattern here
# to prevent internal hook prompts from being saved to context server.
# Patterns are matched against the START of the prompt text.
skip_patterns:
  - "^<task-notification>"
  - "^<bash-notification>"

# Pre-built Claude Code slash commands to skip saving
# These are system-level operations that don't need context preservation
# Source is available at https://code.claude.com/docs/en/commands
