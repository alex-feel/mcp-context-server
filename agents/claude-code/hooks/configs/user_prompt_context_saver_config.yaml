# Message size limits for Windows subprocess pipe buffer handling
# Windows pipes typically have 64KB buffer; use conservative limits
message_limits:
  # Maximum message size in bytes before chunking (default: 32768 = 32KB)
  max_message_size: 32768
  # Size of each chunk in bytes (default: 30000 = ~30KB)
  chunk_size: 30000
  # Estimated bytes for JSON structure overhead
  json_overhead: 500

# Retry settings for thread ID file reading
thread_id:
  # Maximum retry attempts for reading thread ID file
  max_retries: 3

# MCP client settings
mcp_client:
  # Maximum retry attempts for MCP client creation
  max_retries: 3
  # Retry attempts for actual MCP connection (inside async with Client)
  max_connection_retries: 3
  # Timeout per connection attempt (seconds)
  connection_timeout: 30.0
  # Timeout in seconds for first run (may need package download)
  timeout_first_run: 240.0
  # Timeout in seconds for subsequent runs
  timeout_normal: 240.0

# MCP server command configuration
# Command and arguments to start the MCP context server
mcp_server:
  # Transport type: 'stdio' or 'http'
  transport: http
  # HTTP endpoint URL (required when transport: http)
  url: http://localhost:8000/mcp
  # Request timeout in seconds
  timeout: 60.0
  # Command to execute
  # command: uvx
  # Python version to use
  # python_version: "3.12"
  # Package with extras to install
  # package: 'mcp-context-server[embeddings-ollama]<2.0.0'
  # Entry point to run
  # entry_point: mcp-context-server
  # Pre-warm uvx cache at module load to avoid cold start delays
  # prewarm_cache: true

# Chunking reliability settings
# Controls how large messages are split and stored with maximum reliability
chunking:
  # Retry attempts per chunk within a single connection
  max_chunk_retries: 3
  # Initial delay between chunk retries in seconds (exponential backoff applied)
  chunk_retry_delay: 0.5
  # Failure mode for partial chunk storage
  # 'silent': Log only, no user feedback (original behavior)
  # 'warn': Print warning to stderr that displays in TUI
  # 'error': Print error to stderr that displays in TUI
  fail_mode: warn
