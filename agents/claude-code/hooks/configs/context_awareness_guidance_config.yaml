# Context Awareness Guidance Hook Configuration (Universal)
# This config controls the guidance shown at session start
# about checking recent context entries for session continuity.

# Whether the hook is enabled (optional, default: true)
enabled: true

# Guidance content configuration
guidance:
  # Header shown at the start of the message
  header: "THREAD CONTEXT AWARENESS"

  # Purpose explanation
  purpose: >-
    After context compaction or session resume, you may have lost track of session state.
    Check recent context entries to restore awareness of prior work.

  # List of situations when checking context is recommended
  when_to_check:
    - At session start, especially after context compaction
    - When you are unsure about recent work or session state
    - When the user asks about prior work or session history

  # Instructions for how to check context
  how_to_check:
    description: >-
      Use search_context to browse recent entries, then get_context_by_ids for relevant ones
    example: "search_context(thread_id='thread-id', source='agent', limit=5)"

  # List of things to look for when checking context
  what_to_look_for:
    - Recent work reports and their status
    - Pending continuation markers (status: pending)
    - User decisions and preferences from this session

  # Important boundaries to respect
  boundaries:
    - This check is for restoring YOUR session awareness
    - Do NOT preemptively load all context -- retrieve as needed
    - Focus on the most recent entries first

  # Emphasis message at the end
  emphasis: >-
    This check is OPTIONAL but recommended for session continuity.

  # Recovery steps after context compaction
  recovery_after_compaction:
    header: "Recovery After Compaction"
    steps:
      - "Query context-server for most recent entries: search_context(thread_id='...', source='agent', limit=5)"
      - "Look for entries with status: pending to identify interrupted work"
      - "Continue from last confirmed state"
