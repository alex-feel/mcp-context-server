# Context Server Integration
# Lightweight environment for universal MCP Context Server integration.
# Provides persistent memory across Claude Code sessions via context server hooks and skills.
#
# Prerequisites:
#   - uv (required for PEP 723 hooks with inline dependencies)
#   - Docker (required for running the MCP Context Server locally)
#
# Deploy the MCP Context Server:
#   docker compose -f docker-compose.postgresql.ollama.yml up -d

name: Context Server Integration

# Additional files to download (utility modules loaded by other hooks at runtime)
files-to-download:
    - source: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/hook_config_loader.py
      dest: ~/.claude/hooks/
    - source: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/hook_json_output.py
      dest: ~/.claude/hooks/

# Environment variables
os-env-variables:
  MCP_TIMEOUT: "300000"
  MAX_MCP_OUTPUT_TOKENS: "100000"
  ENABLE_TOOL_SEARCH: "1"

# Skills for context management
skills:
  - name: context-retrieval-protocol
    base: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/common/skills/context-retrieval-protocol
    files:
      - SKILL.md

  - name: context-preservation-protocol
    base: https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/common/skills/context-preservation-protocol
    files:
      - SKILL.md

# Rules for context server usage guidance
rules:
  - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/rules/context-server-integration.md

# MCP server configuration
mcp-servers:
  - name: context-server
    scope: user
    transport: http
    url: http://localhost:8000/mcp

# Hook system for context management
hooks:
  files:
    # Context persistence hooks and configs
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/user_prompt_context_saver.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/configs/user_prompt_context_saver_config.yaml
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/subagent_report_context_saver.py

    # Session context hooks
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/thread_id_context.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/task_thread_id_context.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/timezone_date_context.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/task_timezone_date_context.py

    # Project identity
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/worktree_context.py

    # Context lifecycle hooks and configs
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/context_awareness_guidance.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/configs/context_awareness_guidance_config.yaml
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/context_management_precompact.py
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/configs/context_management_precompact_config.yaml

    # Server health
    - https://raw.githubusercontent.com/alex-feel/mcp-context-server/main/agents/claude-code/hooks/mcp_preflight_checks_context.py

  events:
    # SessionStart events (ORDER MATTERS: worktree BEFORE thread_id)
    - event: SessionStart
      matcher: '*'
      type: command
      command: worktree_context.py

    - event: SessionStart
      matcher: '*'
      type: command
      command: thread_id_context.py

    - event: SessionStart
      matcher: '*'
      type: command
      command: timezone_date_context.py

    - event: SessionStart
      matcher: '*'
      type: command
      command: mcp_preflight_checks_context.py

    - event: SessionStart
      matcher: '*'
      type: command
      command: context_awareness_guidance.py
      config: context_awareness_guidance_config.yaml

    # PreCompact event
    - event: PreCompact
      matcher: '*'
      type: command
      command: context_management_precompact.py
      config: context_management_precompact_config.yaml

    # Task enhancement hooks
    - event: PreToolUse
      matcher: Task|Agent
      type: command
      command: task_thread_id_context.py

    - event: PreToolUse
      matcher: Task|Agent
      type: command
      command: task_timezone_date_context.py

    # Context preservation during workflow
    - event: UserPromptSubmit
      type: command
      command: user_prompt_context_saver.py
      config: user_prompt_context_saver_config.yaml

    - event: SubagentStop
      type: command
      command: subagent_report_context_saver.py

# Permissions configuration
permissions:
  defaultMode: default

  allow:
    - mcp__context-server__search_context
    - mcp__context-server__get_context_by_ids
    - mcp__context-server__store_context
    - mcp__context-server__update_context
    - mcp__context-server__hybrid_search_context
    - mcp__context-server__semantic_search_context
    - mcp__context-server__fts_search_context
    - mcp__context-server__list_threads
    - mcp__context-server__get_statistics

  ask:
    - mcp__context-server__store_context_batch
    - mcp__context-server__update_context_batch
    - mcp__context-server__delete_context
    - mcp__context-server__delete_context_batch
